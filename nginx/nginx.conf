# HubSolutions — Nginx reverse proxy
# EasyPanel sobe este container na frente do app

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Segurança ───────────────────────────────────────────────────────────────
  server_tokens off;                        # oculta versão do nginx
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";
  add_header Referrer-Policy "strict-origin-when-cross-origin";
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self'; connect-src 'self'" always;

  # ── Rate limiting ───────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;

  # ── Gzip ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml;

  # ── Logs ────────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # ── Upstream: API Node.js ───────────────────────────────────────────────────
  upstream api {
    server app:3001;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # Rate limit em rotas de autenticação
    location /api/auth/login {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todas as outras rotas da API
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # Frontend React (SPA) — todas as rotas para index.html
    location / {
      try_files $uri $uri/ /index.html;

      # Cache de assets estáticos
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\. { deny all; }
    location ~ \.(env|md|sql|sh)$ { deny all; }
  }
}
