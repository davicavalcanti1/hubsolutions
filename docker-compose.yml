# docker-compose.yml — HubSolutions
# Para uso local e EasyPanel

version: "3.9"

services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-hubsolutions}
      POSTGRES_USER:     ${DB_USER:-hubsolutions_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hubsolutions_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Node.js ─────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          3001
      DB_HOST:       db
      DB_PORT:       5432
      DB_NAME:       ${DB_NAME:-hubsolutions}
      DB_USER:       ${DB_USER:-hubsolutions_user}
      DB_PASSWORD:   ${DB_PASSWORD}
      FRONTEND_URL:  ${FRONTEND_URL}
      SUPABASE_URL:          ${SUPABASE_URL}
      SUPABASE_ANON_KEY:     ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE: ${SUPABASE_SERVICE_ROLE}
      SUPABASE_JWT_SECRET:   ${SUPABASE_JWT_SECRET}
    expose:
      - "3001"

  # ── Nginx (reverse proxy + serve frontend) ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro    # frontend buildado
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
